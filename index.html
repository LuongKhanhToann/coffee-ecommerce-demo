  :root {
    /* Sơn mài palette */
    --paper:      #E6DCC7;
    --paper-2:    #DDD1B7;
    --ink:        #231A13;
    --ink-soft:   #5C4B3B;
    --ink-faint:  #8B7863;
    --gold:       #A67C2E;
    --gold-hi:    #C9A45C;
    --son:        #8C2B20;
    --line:       rgba(35, 26, 19, 0.16);
    --line-soft:  rgba(35, 26, 19, 0.08);
    --card:       #EFE7D6;
    --card-2:     #F5EFE2;
    --shadow:     0 1px 2px rgba(35,26,19,.06), 0 12px 32px -18px rgba(35,26,19,.35);
    --ok:         #3E6B4F;
    --warn:       #9A6B1E;

    --f-display: 'Lora', Georgia, 'Times New Roman', serif;
    --f-body: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    --wrap: 1180px;
    --r: 2px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --paper:     #14100C;
      --paper-2:   #1B1611;
      --ink:       #EDE2CC;
      --ink-soft:  #B8A88E;
      --ink-faint: #83745E;
      --gold:      #C9A45C;
      --gold-hi:   #E3C583;
      --son:       #C1523F;
      --line:      rgba(237, 226, 204, 0.18);
      --line-soft: rgba(237, 226, 204, 0.08);
      --card:      #1D1812;
      --card-2:    #241E16;
      --shadow:    0 1px 2px rgba(0,0,0,.4), 0 16px 40px -20px rgba(0,0,0,.8);
      --ok:        #7FB08F;
      --warn:      #D6A54E;
    }
  }
  :root[data-theme="dark"] {
    --paper:     #14100C;
    --paper-2:   #1B1611;
    --ink:       #EDE2CC;
    --ink-soft:  #B8A88E;
    --ink-faint: #83745E;
    --gold:      #C9A45C;
    --gold-hi:   #E3C583;
    --son:       #C1523F;
    --line:      rgba(237, 226, 204, 0.18);
    --line-soft: rgba(237, 226, 204, 0.08);
    --card:      #1D1812;
    --card-2:    #241E16;
    --shadow:    0 1px 2px rgba(0,0,0,.4), 0 16px 40px -20px rgba(0,0,0,.8);
    --ok:        #7FB08F;
    --warn:      #D6A54E;
  }
  :root[data-theme="light"] {
    --paper:      #E6DCC7;
    --paper-2:    #DDD1B7;
    --ink:        #231A13;
    --ink-soft:   #5C4B3B;
    --ink-faint:  #8B7863;
    --gold:       #A67C2E;
    --gold-hi:    #C9A45C;
    --son:        #8C2B20;
    --line:       rgba(35, 26, 19, 0.16);
    --line-soft:  rgba(35, 26, 19, 0.08);
    --card:       #EFE7D6;
    --card-2:     #F5EFE2;
    --shadow:     0 1px 2px rgba(35,26,19,.06), 0 12px 32px -18px rgba(35,26,19,.35);
    --ok:         #3E6B4F;
    --warn:       #9A6B1E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--f-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: .5;
    background-image: var(--grain, none);
    mix-blend-mode: overlay;
  }

  h1, h2, h3, h4 { font-family: var(--f-display); font-weight: 400; text-wrap: balance; margin: 0; letter-spacing: -0.01em; }
  p { margin: 0; }
  img { max-width: 100%; }
  button { font: inherit; color: inherit; cursor: pointer; }
  a { color: inherit; }

  :focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 28px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  .muted { color: var(--ink-soft); }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- header ---------- */
  header.site {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line-soft);
  }
  .bar { display: flex; align-items: center; gap: 32px; height: 68px; }
  .brand { display: flex; align-items: center; gap: 11px; cursor: pointer; margin-right: auto; }
  .seal {
    width: 34px; height: 34px; flex: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    display: grid; place-items: center;
    font-family: var(--f-display);
    font-size: 17px;
    border-radius: 50%;
  }
  .brand-name { font-family: var(--f-display); font-size: 21px; letter-spacing: .16em; }
  .brand-sub { font-size: 9px; letter-spacing: .26em; text-transform: uppercase; color: var(--ink-faint); margin-top: -3px; }

  nav.main { display: flex; gap: 26px; }
  nav.main button {
    background: none; border: 0; padding: 4px 0;
    font-size: 13px; letter-spacing: .06em;
    color: var(--ink-soft);
    border-bottom: 1px solid transparent;
  }
  nav.main button:hover, nav.main button[aria-current="true"] { color: var(--ink); border-bottom-color: var(--gold); }

  .tools { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    background: none; border: 1px solid var(--line);
    width: 38px; height: 38px; display: grid; place-items: center;
    border-radius: var(--r); position: relative;
    transition: border-color .2s, background .2s;
  }
  .icon-btn:hover { border-color: var(--gold); }
  .badge {
    position: absolute; top: -7px; right: -7px;
    background: var(--son); color: #F6EEDC;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: grid; place-items: center; padding: 0 4px;
    font-variant-numeric: tabular-nums;
  }
  .badge[hidden] { display: none; }

  /* ---------- buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    padding: 14px 26px;
    background: var(--ink); color: var(--paper);
    border: 1px solid var(--ink);
    border-radius: var(--r);
    font-size: 13px; font-weight: 600;
    letter-spacing: .09em; text-transform: uppercase;
    transition: background .2s, color .2s, border-color .2s;
  }
  .btn:hover { background: var(--gold); border-color: var(--gold); color: #17110A; }
  .btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn.ghost:hover { border-color: var(--gold); color: var(--gold); background: transparent; }
  .btn.gold { background: var(--gold); border-color: var(--gold); color: #17110A; }
  .btn.gold:hover { background: var(--gold-hi); border-color: var(--gold-hi); }
  .btn.wide { width: 100%; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ---------- hero ---------- */
  .hero {
    position: relative;
    border-bottom: 1px solid var(--line-soft);
    overflow: hidden;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.05fr .95fr;
    gap: 48px;
    align-items: center;
    min-height: 78vh;
    padding: 72px 0;
  }
  .hero h1 {
    font-size: clamp(46px, 6.4vw, 88px);
    line-height: .98;
    margin: 22px 0 0;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .hero-lede {
    margin-top: 26px;
    max-width: 46ch;
    font-size: 17px;
    color: var(--ink-soft);
  }
  .hero-cta { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }
  .hero-facts {
    display: flex; gap: 40px; margin-top: 54px;
    padding-top: 26px; border-top: 1px solid var(--line-soft);
  }
  .fact strong { display: block; font-family: var(--f-display); font-size: 27px; }
  .fact span { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); }

  .hero-art { position: relative; display: grid; place-items: center; }
  .hero-art .halo {
    position: absolute; width: 108%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--gold) 26%, transparent), transparent 62%);
    filter: blur(6px);
  }
  .hero-art svg { position: relative; width: min(100%, 400px); filter: drop-shadow(0 30px 50px rgba(0,0,0,.28)); }

  /* ---------- sections ---------- */
  section.band { padding: 96px 0; border-bottom: 1px solid var(--line-soft); }
  .sec-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 44px; }
  .sec-head h2 { font-size: clamp(30px, 3.6vw, 44px); line-height: 1.06; margin-top: 10px; }
  .sec-head p { max-width: 42ch; color: var(--ink-soft); font-size: 15px; }

  /* ---------- product grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line-soft);
  }
  .card {
    background: var(--paper);
    padding: 22px 22px 24px;
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: background .25s;
    position: relative;
  }
  .card:hover { background: var(--card); }
  .card .packshot {
    aspect-ratio: 4/5;
    display: grid; place-items: center;
    margin-bottom: 18px;
    position: relative;
  }
  .card .packshot svg { width: 62%; transition: transform .4s cubic-bezier(.2,.8,.2,1); }
  .card:hover .packshot svg { transform: translateY(-6px) scale(1.03); }
  .tag {
    position: absolute; top: 0; left: 0;
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    padding: 4px 9px; font-weight: 700;
    background: var(--son); color: #F6EEDC;
  }
  .tag.soft { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .card h3 { font-size: 20px; }
  .card .origin { font-size: 12px; color: var(--ink-faint); letter-spacing: .05em; margin-top: 3px; }
  .card .notes { font-size: 13px; color: var(--ink-soft); margin-top: 10px; flex: 1; }
  .card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line-soft); }
  .price { font-family: var(--f-display); font-size: 19px; font-variant-numeric: tabular-nums; }
  .price s { color: var(--ink-faint); font-size: 14px; margin-right: 7px; }
  .add-mini {
    background: none; border: 1px solid var(--line); border-radius: var(--r);
    padding: 7px 13px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
  }
  .add-mini:hover { border-color: var(--gold); color: var(--gold); }

  /* filters */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 26px; }
  .chip {
    background: none; border: 1px solid var(--line);
    padding: 8px 15px; border-radius: 100px;
    font-size: 12px; letter-spacing: .05em;
    color: var(--ink-soft);
  }
  .chip[aria-pressed="true"] { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ---------- PDP ---------- */
  .pdp { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; padding: 56px 0 96px; align-items: start; }
  .pdp-art {
    background: var(--card);
    border: 1px solid var(--line-soft);
    aspect-ratio: 1;
    display: grid; place-items: center;
    position: relative;
    overflow: hidden;
  }
  .pdp-art::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 40%, color-mix(in srgb, var(--gold) 18%, transparent), transparent 60%);
  }
  .pdp-art svg { width: 54%; position: relative; z-index: 1; filter: drop-shadow(0 26px 40px rgba(0,0,0,.3)); }
  .pdp h1 { font-size: clamp(32px, 4vw, 46px); line-height: 1.05; margin-top: 12px; }
  .pdp .lede { margin-top: 18px; color: var(--ink-soft); max-width: 52ch; }
  .pdp .price-lg { font-family: var(--f-display); font-size: 32px; margin-top: 22px; font-variant-numeric: tabular-nums; }

  .opt-group { margin-top: 26px; }
  .opt-label { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px; font-weight: 600; }
  .opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .opt {
    border: 1px solid var(--line); background: none;
    padding: 10px 17px; border-radius: var(--r);
    font-size: 13px;
  }
  .opt[aria-pressed="true"] { border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .opt:hover:not([aria-pressed="true"]) { border-color: var(--gold); }

  .qty { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: var(--r); }
  .qty button { background: none; border: 0; width: 40px; height: 44px; font-size: 17px; }
  .qty button:hover { color: var(--gold); }
  .qty span { width: 42px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }

  .buy-row { display: flex; gap: 12px; margin-top: 30px; align-items: stretch; }
  .buy-row .btn { flex: 1; }

  .spec { margin-top: 36px; border-top: 1px solid var(--line-soft); }
  .spec-row { display: flex; justify-content: space-between; gap: 20px; padding: 13px 0; border-bottom: 1px solid var(--line-soft); font-size: 14px; }
  .spec-row dt { color: var(--ink-faint); }
  .spec-row dd { margin: 0; text-align: right; }

  /* ---------- cart drawer ---------- */
  .scrim {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(12, 9, 6, .5);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  aside.cart {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 95;
    width: min(430px, 100%);
    background: var(--paper);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .38s cubic-bezier(.2,.8,.2,1);
  }
  aside.cart.open { transform: none; }
  .cart-head { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; border-bottom: 1px solid var(--line-soft); }
  .cart-head h3 { font-size: 20px; }
  .cart-body { flex: 1; overflow-y: auto; padding: 8px 24px; }
  .cart-foot { padding: 20px 24px 24px; border-top: 1px solid var(--line-soft); background: var(--card); }

  .line-item { display: grid; grid-template-columns: 62px 1fr auto; gap: 14px; padding: 18px 0; border-bottom: 1px solid var(--line-soft); }
  .line-item .thumb { background: var(--card); border: 1px solid var(--line-soft); display: grid; place-items: center; aspect-ratio: 1; }
  .line-item .thumb svg { width: 56%; }
  .li-name { font-family: var(--f-display); font-size: 16px; }
  .li-var { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
  .li-ctl { display: flex; align-items: center; gap: 10px; margin-top: 9px; }
  .li-ctl button { background: none; border: 1px solid var(--line); width: 24px; height: 24px; border-radius: 2px; line-height: 1; display: grid; place-items: center; font-size: 13px; }
  .li-ctl button:hover { border-color: var(--gold); color: var(--gold); }
  .li-ctl .n { font-size: 13px; width: 18px; text-align: center; font-variant-numeric: tabular-nums; }
  .li-right { text-align: right; display: flex; flex-direction: column; justify-content: space-between; }
  .li-price { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 14px; }
  .li-rm { background: none; border: 0; padding: 0; font-size: 11px; color: var(--ink-faint); text-decoration: underline; text-underline-offset: 3px; }
  .li-rm:hover { color: var(--son); }

  .totals { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; font-size: 14px; }
  .totals .row { display: flex; justify-content: space-between; }
  .totals .row.grand { font-family: var(--f-display); font-size: 22px; padding-top: 11px; border-top: 1px solid var(--line); margin-top: 4px; }
  .totals .num { font-variant-numeric: tabular-nums; }
  .free-ship { font-size: 12px; color: var(--gold); display: flex; align-items: center; gap: 6px; }

  .empty { text-align: center; padding: 70px 20px; color: var(--ink-faint); }
  .empty svg { width: 46px; opacity: .35; margin-bottom: 14px; }

  /* ---------- checkout ---------- */
  .checkout { display: grid; grid-template-columns: 1.25fr .85fr; gap: 56px; padding: 48px 0 96px; align-items: start; }
  .steps { display: flex; gap: 10px; align-items: center; margin-bottom: 34px; font-size: 12px; letter-spacing: .06em; color: var(--ink-faint); }
  .steps .s { display: flex; align-items: center; gap: 7px; }
  .steps .s .dot { width: 21px; height: 21px; border-radius: 50%; border: 1px solid var(--line); display: grid; place-items: center; font-size: 11px; font-weight: 700; }
  .steps .s.on { color: var(--ink); }
  .steps .s.on .dot { background: var(--gold); border-color: var(--gold); color: #17110A; }
  .steps .s.done .dot { background: var(--ok); border-color: var(--ok); color: var(--paper); }
  .steps .sep { flex: 1; height: 1px; background: var(--line-soft); min-width: 16px; }

  fieldset { border: 0; padding: 0; margin: 0 0 30px; }
  legend { font-family: var(--f-display); font-size: 22px; margin-bottom: 16px; padding: 0; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; }
  .field input, .field select, .field textarea {
    font: inherit; font-size: 15px;
    padding: 12px 13px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); outline: none; }
  .field .err { font-size: 12px; color: var(--son); display: none; }
  .field.invalid input, .field.invalid select { border-color: var(--son); }
  .field.invalid .err { display: block; }

  .pay-opts { display: flex; flex-direction: column; gap: 10px; }
  .pay {
    display: flex; align-items: center; gap: 13px;
    padding: 15px 16px; border: 1px solid var(--line); border-radius: var(--r);
    cursor: pointer; background: var(--card-2);
  }
  .pay[aria-pressed="true"] { border-color: var(--gold); background: color-mix(in srgb, var(--gold) 10%, var(--card-2)); }
  .pay .mark { width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 3px; display: grid; place-items: center; flex: none; color: var(--gold); }
  .pay .t { flex: 1; text-align: left; }
  .pay .t strong { display: block; font-size: 14px; font-weight: 600; }
  .pay .t span { font-size: 12px; color: var(--ink-faint); }

  .summary { background: var(--card); border: 1px solid var(--line-soft); padding: 26px; position: sticky; top: 92px; }
  .summary h3 { font-size: 20px; margin-bottom: 18px; }
  .sum-item { display: grid; grid-template-columns: 46px 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .sum-item .thumb { background: var(--paper); border: 1px solid var(--line-soft); display: grid; place-items: center; }
  .sum-item .thumb svg { width: 60%; }
  .sum-item .n { font-family: var(--f-display); font-size: 15px; }
  .sum-item .v { color: var(--ink-faint); font-size: 11px; }
  .sum-item .p { font-variant-numeric: tabular-nums; align-self: center; }

  .coupon { display: flex; gap: 8px; margin: 18px 0; }
  .coupon input { flex: 1; font: inherit; font-size: 14px; padding: 11px 12px; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); color: var(--ink); }
  .coupon button { padding: 11px 16px; background: none; border: 1px solid var(--line); border-radius: var(--r); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
  .coupon button:hover { border-color: var(--gold); color: var(--gold); }
  .coupon-msg { font-size: 12px; margin-top: -10px; margin-bottom: 14px; }
  .coupon-msg.ok { color: var(--ok); }
  .coupon-msg.bad { color: var(--son); }

  /* ---------- confirmation / tracking ---------- */
  .confirm { padding: 60px 0 96px; max-width: 800px; margin: 0 auto; }
  .confirm-top { text-align: center; padding-bottom: 44px; border-bottom: 1px solid var(--line-soft); }
  .stamp {
    width: 78px; height: 78px; margin: 0 auto 24px;
    border: 1.5px solid var(--gold); color: var(--gold);
    border-radius: 50%; display: grid; place-items: center;
    animation: pop .6s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop { from { transform: scale(.3) rotate(-14deg); opacity: 0; } }
  .confirm-top h1 { font-size: clamp(30px, 4vw, 42px); }
  .order-code {
    display: inline-block; margin-top: 18px;
    font-family: var(--f-display); font-size: 24px; letter-spacing: .1em;
    padding: 9px 20px; border: 1px dashed var(--gold); color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  .sent {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--line-soft); border: 1px solid var(--line-soft);
    margin: 34px 0;
  }
  .sent-card { background: var(--card); padding: 20px; display: flex; gap: 13px; align-items: flex-start; }
  .sent-card .ic { color: var(--ok); flex: none; margin-top: 2px; }
  .sent-card strong { display: block; font-size: 13px; font-weight: 600; }
  .sent-card span { font-size: 12.5px; color: var(--ink-soft); }

  .track-panel { background: var(--card); border: 1px solid var(--line-soft); padding: 30px; margin-top: 8px; }
  .track-top { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; align-items: center; padding-bottom: 22px; border-bottom: 1px solid var(--line-soft); margin-bottom: 26px; }
  .track-top .awb { font-size: 12px; color: var(--ink-faint); }
  .track-top .awb b { color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: .05em; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 13px; border-radius: 100px;
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    background: color-mix(in srgb, var(--warn) 16%, transparent);
    color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 40%, transparent);
  }
  .pill.done { background: color-mix(in srgb, var(--ok) 16%, transparent); color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, transparent); }
  .pill .blip { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blip 1.4s ease-in-out infinite; }
  @keyframes blip { 50% { opacity: .25; } }

  .timeline { position: relative; padding-left: 30px; }
  .timeline::before { content: ""; position: absolute; left: 8px; top: 8px; bottom: 8px; width: 1px; background: var(--line); }
  .tl-fill { position: absolute; left: 8px; top: 8px; width: 1px; background: var(--gold); transition: height .8s ease; }
  .tl { position: relative; padding: 0 0 26px; }
  .tl:last-child { padding-bottom: 0; }
  .tl .dot {
    position: absolute; left: -30px; top: 3px;
    width: 17px; height: 17px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--paper);
    display: grid; place-items: center; color: transparent;
    transition: all .4s;
  }
  .tl.done .dot { background: var(--gold); border-color: var(--gold); color: #17110A; }
  .tl.now .dot { border-color: var(--gold); box-shadow: 0 0 0 4px color-mix(in srgb, var(--gold) 22%, transparent); }
  .tl.now .dot::after { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
  .tl h4 { font-size: 16px; color: var(--ink-faint); transition: color .3s; }
  .tl.done h4, .tl.now h4 { color: var(--ink); }
  .tl .when { font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; margin-top: 2px; }
  .tl .place { font-size: 13px; color: var(--ink-soft); margin-top: 5px; }

  .lookup { max-width: 520px; margin: 0 auto; padding: 80px 0 110px; text-align: center; }
  .lookup form { display: flex; gap: 8px; margin-top: 26px; }
  .lookup input { flex: 1; font: inherit; padding: 14px 15px; background: var(--card-2); border: 1px solid var(--line); border-radius: var(--r); color: var(--ink); letter-spacing: .08em; }
  .lookup input:focus { border-color: var(--gold); outline: none; }
  .lookup .hint { font-size: 12.5px; color: var(--ink-faint); margin-top: 14px; }
  .lookup .bad { color: var(--son); font-size: 13px; margin-top: 14px; }

  /* ---------- story strip ---------- */
  .story { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line-soft); border: 1px solid var(--line-soft); }
  .story > div { background: var(--paper); padding: 32px 28px; }
  .story h3 { font-size: 19px; margin: 14px 0 8px; }
  .story p { font-size: 14px; color: var(--ink-soft); }
  .story .ic { color: var(--gold); }

  /* ---------- footer ---------- */
  footer.site { padding: 60px 0 40px; }
  .foot-grid { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; padding-bottom: 34px; border-bottom: 1px solid var(--line-soft); }
  .foot-grid p { font-size: 14px; color: var(--ink-soft); max-width: 34ch; margin-top: 12px; }
  .foot-col h5 { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 12px; font-weight: 600; font-family: var(--f-body); }
  .foot-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 7px; font-size: 14px; color: var(--ink-soft); }
  .foot-bottom { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; padding-top: 24px; font-size: 12px; color: var(--ink-faint); }

  /* ---------- toast ---------- */
  .toast {
    position: fixed; bottom: 26px; left: 50%;
    z-index: 200;
    display: flex; align-items: center; gap: 10px;
    padding: 13px 20px;
    background: var(--ink); color: var(--paper);
    border-radius: var(--r);
    font-size: 14px;
    box-shadow: var(--shadow);
    transform: translate(-50%, 120%);
    transition: transform .4s cubic-bezier(.2,.9,.2,1);
  }
  .toast.show { transform: translate(-50%, 0); }

  .demo-flag {

function pick(k, v) {
  window._sel[k] = v;

  $('pdpPrice').textContent = money(unitPrice(window._sel));
}
function bump(d) {
  window._sel.qty = Math.max(1, Math.min(20, window._sel.qty + d));
  $('pdpQty').textContent = window._sel.qty;
}
function unitPrice(sel) {
  const p = PRODUCTS.find(x => x.id === sel.id);
  const m = SIZES.find(s => s.k === sel.size);
  return Math.round(p.price * (m ? m.m : 1) / 1000) * 1000;
}

/* ============================ CART ============================ */
function quickAdd(id) {
  const simple = NO_VARIANT.includes(id);
  addToCart({ id, size: simple ? '—' : '250g', grind: simple ? '—' : 'Nguyên hạt', qty: 1 });
}
function addSel(buyNow) {
  addToCart({ ...window._sel });
  if (buyNow) { closeCart(); go('checkout'); }
}
function addToCart(sel) {
  const key = sel.id + '|' + sel.size + '|' + sel.grind;
  const found = cart.find(l => l.key === key);
  if (found) found.qty = Math.min(20, found.qty + sel.qty);
  else cart.push({ key, ...sel, unit: unitPrice(sel) });
  syncCart();
  const p = PRODUCTS.find(x => x.id === sel.id);
  toast(`Đã thêm ${p.name} vào giỏ`);
  openCart();
}
function setQty(key, d) {
  const l = cart.find(x => x.key === key);
  if (!l) return;
  l.qty += d;
  if (l.qty < 1) cart = cart.filter(x => x.key !== key);
  syncCart();
}
function removeLine(key) { cart = cart.filter(x => x.key !== key); syncCart(); }

function subtotal() { return cart.reduce((s, l) => s + l.unit * l.qty, 0); }
function shipFee() { const s = subtotal(); return s === 0 || s >= 500000 ? 0 : 30000; }
function discount() { return coupon ? Math.round(subtotal() * coupon.pct / 100) : 0; }
function grand() { return subtotal() - discount() + shipFee(); }

function syncCart() {
  const n = cart.reduce((s, l) => s + l.qty, 0);
  const b = $('cartBadge');
  b.textContent = n; b.hidden = n === 0;
  renderCartDrawer();
  if (view === 'checkout') renderCheckout();
}

/* ============================ ORDER ============================ */
function placeOrder() {
  const rules = [
    ['f-name',  v => v.trim().length >= 2],
    ['f-phone', v => v.replace(/\D/g, '').length >= 9],
    ['f-email', v => /^\S+@\S+\.\S+$/.test(v.trim())],
    ['f-addr',  v => v.trim().length >= 5],
    ['f-city',  v => v !== ''],
  ];
  let ok = true, first = null;
  rules.forEach(([id, test]) => {
    const el = $(id), wrap = el.closest('.field');
    const good = test(el.value);
    wrap.classList.toggle('invalid', !good);
    if (!good && !first) first = el;
    if (!good) ok = false;
  });
  if (!ok) { first.focus(); toast('Vui lòng kiểm tra lại thông tin nhận hàng'); return; }

  const rnd = n => Math.floor(Math.random() * n);
  const code = 'MC-' + String(rnd(900000) + 100000);
  const awb  = 'GHTK' + String(rnd(9000000000) + 1000000000);
  const order = {
    code, awb,
    at: Date.now(),
    name: $('f-name').value.trim(),
    phone: $('f-phone').value.trim(),
    email: $('f-email').value.trim(),
    addr: $('f-addr').value.trim() + ', ' + $('f-city').value,
    note: $('f-note').value.trim(),
    pay: { cod:'Thanh toán khi nhận hàng (COD)', bank:'Chuyển khoản ngân hàng', momo:'Ví MoMo / ZaloPay' }[payment],
    items: cart.map(l => ({ ...l })),
    total: grand(),
    coupon: coupon ? coupon.code : null,
  };
  orders[code] = order;
  cart = []; coupon = null;
  syncCart();
  go('confirm', code);
}

const fmtTime = ms => new Date(ms).toLocaleString('vi-VN', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });

/* Demo tempo: 1 "stage step" = 6 seconds of real time */
const TICK = 6000;
function stageIndex(o) {
  const elapsed = (Date.now() - o.at) / TICK;
  let i = 0;
  STAGES.forEach((s, k) => { if (elapsed >= s.s) i = k; });
  return i;
}
function stageTime(o, k) { return o.at + STAGES[k].s * TICK; }

function trackerHTML(o) {
  const i = stageIndex(o);
  const done = i >= STAGES.length - 1;
  return `<div class="track-panel">
    <div class="track-top">
      <div>
        <span class="eyebrow">Theo dõi vận chuyển</span>

      </div>
      <span class="pill ${done ? 'done' : ''}">${done ? '' : '<span class="blip"></span>'}${STAGES[i].t}</span>
    </div>
    <div class="timeline">
      <div class="tl-fill" style="height:${(i / (STAGES.length - 1)) * 100}%"></div>
      ${STAGES.map((s, k) => `
        <div class="tl ${k < i ? 'done' : k === i ? 'now done' : ''}">
          <div class="dot">${k <= i ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M20 6 9 17l-5-5"/></svg>' : ''}</div>
          <h4>${s.t}</h4>
          <div class="when">${k <= i ? fmtTime(stageTime(o, k)) : 'Dự kiến ' + fmtTime(stageTime(o, k))}</div>
          <div class="place">${s.p}</div>
        </div>`).join('')}
    </div>
    ${done ? '' : `<p class="muted" style="font-size:12px;margin-top:22px;display:flex;align-items:center;gap:8px">
      <span class="demo-flag">Demo</span> Trạng thái tự cập nhật mỗi vài giây để anh/chị xem luồng tracking chạy thật.</p>`}
  </div>`;
}

let tickTimer = null;
function mountTracker(o, host) {
  clearInterval(tickTimer);
  const paint = () => {
    if (!document.body.contains(host)) { clearInterval(tickTimer); return; }
    host.innerHTML = trackerHTML(o);
  };
  paint();
  tickTimer = setInterval(paint, 1500);
}

  $('toastMsg').textContent = msg;
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2600);
}

function toggleTheme() {
  const root = document.documentElement;
  const dark = root.getAttribute('data-theme')
    ? root.getAttribute('data-theme') === 'dark'
    : matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme', dark ? 'light' : 'dark');
}

/* grain texture */
(function grain() {
  const c = document.createElement('canvas');
  c.width = c.height = 140;
  const x = c.getContext('2d');
  const img = x.createImageData(140, 140);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = 118 + Math.floor(Math.random() * 30);
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = 16;
  }
  x.putImageData(img, 0, 0);
  document.documentElement.style.setProperty('--grain', `url(${c.toDataURL()})`);
})();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });

syncCart();
go('home');
</script>
